<!DOCTYPE html>
<html>
<head>
    <title>Quiz</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }
        button {
            padding: 10px 20px;
            margin: 10px;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h1>Quiz Page</h1>

<p>Q1: What is 2 + 2 ?</p>
<button onclick="check(4)">4</button>
<button onclick="check(5)">5</button>

<p id="result"></p>

<br>
<button onclick="goBack()">Back to Dashboard</button>

<script>
function check(ans){
    if(ans == 4){
        document.getElementById("result").innerText = "Correct ✅";
    } else {
        document.getElementById("result").innerText = "Wrong ❌";
    }
}

function goBack(){
    window.location.href = "dashboard.html";
}
</script>

</body>
</html>
