<!DOCTYPE html>
<html>
<head>
<title>Advanced Quiz</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
}

.container {
    margin-top: 40px;
}

.option {
    display: block;
    padding: 10px;
    margin: 10px auto;
    width: 250px;
    background: green;
    color: white;
    border: none;
    cursor: pointer;
    border-radius: 5px;
}

.correct { background: green !important; }
.wrong { background: red !important; }

button {
    padding: 10px 20px;
    margin-top: 20px;
    background: #22c55e;
    border: none;
    cursor: pointer;
}

#timer {
    font-size: 18px;
    margin-bottom: 15px;
    color: yellow;
}
</style>

</head>

<body>

<div class="container">
    <h2 id="timer">Time: 15</h2>
    <h2 id="question"></h2>

    <div id="options"></div>

    <button onclick="nextQuestion()">Next</button>

    <h3 id="result"></h3>
</div>

<script>

let quiz = [
{q:"Which data structure uses FIFO?", options:["Stack","Queue","Tree","Graph"], answer:"Queue"},
{q:"Time complexity of binary search?", options:["O(n)","O(log n)","O(n^2)","O(1)"], answer:"O(log n)"},
{q:"Which is not a programming language?", options:["Python","Java","HTML","C++"], answer:"HTML"},
{q:"CPU stands for?", options:["Central Process Unit","Central Processing Unit","Control Processing Unit","None"], answer:"Central Processing Unit"},
{q:"Which is used for styling web pages?", options:["HTML","CSS","JS","Python"], answer:"CSS"},
{q:"Primary key is used in?", options:["OS","DBMS","Networking","AI"], answer:"DBMS"},
{q:"Which is an operating system?", options:["Linux","Oracle","MySQL","HTTP"], answer:"Linux"},
{q:"Which protocol is used for web?", options:["FTP","HTTP","SMTP","TCP"], answer:"HTTP"},
{q:"RAM is?", options:["Permanent","Temporary","Storage","Network"], answer:"Temporary"},
{q:"Which is backend language?", options:["HTML","CSS","JS","Node.js"], answer:"Node.js"}
];

let index = 0;
let score = 0;
let answered = false;
let time = 15;
let timer;

function loadQuestion(){
    answered = false;
    time = 15;

    document.getElementById("timer").innerText = "Time: " + time;

    timer = setInterval(()=>{
        time--;
        document.getElementById("timer").innerText = "Time: " + time;

        if(time === 0){
            clearInterval(timer);
            nextQuestion();
        }
    },1000);

    let q = quiz[index];
    document.getElementById("question").innerText = q.q;

    let optionsHTML = "";
    q.options.forEach(opt => {
        optionsHTML += `<button class="option" onclick="checkAnswer(this,'${opt}')">${opt}</button>`;
    });

    document.getElementById("options").innerHTML = optionsHTML;
}

function checkAnswer(btn, selected){
    if(answered) return;

    answered = true;
    clearInterval(timer);

    let correct = quiz[index].answer;

    let buttons = document.querySelectorAll(".option");

    buttons.forEach(b => {
        if(b.innerText === correct){
            b.classList.add("correct");
        }
        if(b.innerText === selected && selected !== correct){
            b.classList.add("wrong");
        }
    });

    if(selected === correct){
        score++;
    }
}

function nextQuestion(){
    clearInterval(timer);

    index++;

    if(index < quiz.length){
        loadQuestion();
    } else {
        let percentage = (score / quiz.length) * 100;

        document.getElementById("question").innerText = "Quiz Completed 🎉";
        document.getElementById("options").innerHTML = "";

        document.getElementById("result").innerHTML =
            "Score: " + score + " / " + quiz.length + "<br>" +
            "Percentage: " + percentage.toFixed(2) + "%";
    }
}

// Start quiz
loadQuestion();

</script>

</body>
</html>
