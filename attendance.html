<!DOCTYPE html>
<html>
<head>
<title>Attendance</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.card {
    background: #fff;
    padding: 30px;
    border-radius: 15px;
    text-align: center;
    width: 320px;
}

h1 {
    margin-bottom: 20px;
}

input {
    width: 90%;
    padding: 10px;
    margin: 10px;
    font-size: 16px;
}

button {
    padding: 10px 20px;
    margin-top: 10px;
    background: #444;
    color: white;
    border: none;
    cursor: pointer;
}

.result {
    margin-top: 20px;
    font-size: 18px;
    font-weight: bold;
}

.good {
    color: green;
}

.bad {
    color: red;
}

a {
    display: block;
    margin-top: 15px;
}
</style>

</head>

<body>

<div class="card">
    <h1>Attendance</h1>

    <input type="number" id="total" placeholder="Total Classes">
    <input type="number" id="attended" placeholder="Attended Classes">

    <button onclick="calculate()">Save & Calculate</button>

    <div class="result" id="result"></div>

    <a href="dashboard.html">Back</a>
</div>

<script>

// Load saved data when page opens
window.onload = function(){
    let total = localStorage.getItem("total");
    let attended = localStorage.getItem("attended");

    if(total && attended){
        document.getElementById("total").value = total;
        document.getElementById("attended").value = attended;
        showResult(total, attended);
    }
};

function calculate(){
    let total = document.getElementById("total").value;
    let attended = document.getElementById("attended").value;

    if(total == 0 || attended > total){
        alert("Enter valid values");
        return;
    }

    // Save data
    localStorage.setItem("total", total);
    localStorage.setItem("attended", attended);

    showResult(total, attended);
}

function showResult(total, attended){
    let percentage = (attended / total) * 100;
    let resultDiv = document.getElementById("result");

    let status = "";
    let className = "";

    if(percentage >= 75){
        status = "Good Attendance ✅";
        className = "good";
    } else {
        status = "Low Attendance ❌";
        className = "bad";
    }

    resultDiv.innerHTML =
        "Attendance: " + percentage.toFixed(2) + "%<br>" +
        "<span class='" + className + "'>" + status + "</span>";
}
</script>

</body>
</html>
