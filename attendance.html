<!DOCTYPE html>
<html>
<head>
<title>Attendance</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
}

.container {
    margin-top: 80px;
}

input {
    padding: 10px;
    margin: 10px;
    width: 200px;
}

button {
    padding: 10px 20px;
    background: green;
    color: white;
    border: none;
    cursor: pointer;
}

.result {
    margin-top: 20px;
    font-size: 20px;
}
</style>

</head>

<body>

<div class="container">
    <h1>Attendance System</h1>

    <input type="number" id="total" placeholder="Total Classes"><br>
    <input type="number" id="present" placeholder="Present Classes"><br>

    <button onclick="calculate()">Calculate</button>

    <div class="result" id="result"></div>

    <br>
    <a href="dashboard.html" style="color:white;">Back to Dashboard</a>
</div>

<script>

function calculate(){
    let total = document.getElementById("total").value;
    let present = document.getElementById("present").value;

    if(total == 0 || present > total){
        alert("Enter valid values");
        return;
    }

    let percentage = (present / total) * 100;

    let status = "";
    if(percentage >= 75){
        status = "Good Attendance ✅";
    } else {
        status = "Low Attendance ❌";
    }

    document.getElementById("result").innerHTML =
        "Total Classes: " + total + "<br>" +
        "Present: " + present + "<br>" +
        "Attendance: " + percentage.toFixed(2) + "%<br>" +
        status;
}

</script>

</body>
</html>
