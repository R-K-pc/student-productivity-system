<!DOCTYPE html>
<html>
<head>
<title>Attendance</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #333;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.card {
    background: #fff;
    padding: 30px;
    border-radius: 15px;
    text-align: center;
    width: 300px;
}

h1 {
    margin-bottom: 20px;
}

input {
    width: 90%;
    padding: 10px;
    margin: 10px;
    font-size: 16px;
}

button {
    padding: 10px 20px;
    margin-top: 10px;
    background: #444;
    color: white;
    border: none;
    cursor: pointer;
}

.result {
    margin-top: 20px;
    font-size: 18px;
    font-weight: bold;
}
</style>

</head>

<body>

<div class="card">
    <h1>Attendance</h1>

    <input type="number" id="total" placeholder="Total Classes">
    <input type="number" id="attended" placeholder="Attended Classes">

    <button onclick="calculate()">Save & Calculate</button>

    <div class="result" id="result"></div>

    <br>
    <a href="dashboard.html">Back</a>
</div>

<script>
function calculate(){
    let total = document.getElementById("total").value;
    let attended = document.getElementById("attended").value;

    if(total == 0){
        alert("Enter valid total classes");
        return;
    }

    let percentage = (attended / total) * 100;

    document.getElementById("result").innerText =
        "Attendance: " + percentage.toFixed(2) + "%";
}
</script>

</body>
</html>
