<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        .container {
            margin-top: 60px;
        }

        h1 {
            margin-bottom: 30px;
        }

        button {
            padding: 12px 25px;
            margin: 10px;
            background: #22c55e;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #16a34a;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Welcome Rahul Kamble 🚀</h1>

    <h2>Student Productivity Dashboard</h2>

    <button onclick="openQuiz()">🧠 Quiz</button>
    <button onclick="openAttendance()">📅 Attendance</button>
    <button onclick="openPortfolio()">👤 Portfolio</button>
    <button onclick="logout()">🚪 Logout</button>
</div>

<script>
function openQuiz(){
    window.location.href = "quiz.html";
}

function openAttendance(){
    window.location.href = "attendance.html";
}

function openPortfolio(){
    window.location.href = "portfolio.html";
}

function logout(){
    window.location.href = "index.html";
}
</script>

</body>
</html>
